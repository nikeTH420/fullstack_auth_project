<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card Container */
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }

        .auth-card {
            background: rgba(25, 27, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Success Icon Custom Graphic */
        .success-icon-box {
            width: 72px;
            height: 72px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.75rem;
        }

        .success-icon-box svg {
            width: 32px;
            height: 32px;
            stroke: #6366f1;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s ease-out 0.2s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Typography */
        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            color: #fff;
        }

        p.subtitle {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        /* Dashboard Interface Simulation */
        .user-badge {
            background: #181a23;
            border: 1px solid #2d3142;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2d3142;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #6366f1;
        }

        .user-info .name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }

        .user-info .role {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        /* Button */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.85rem;
            background: #181a23;
            color: #9ca3af;
            border: 1px solid #2d3142;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #1c1e2b;
            color: #fff;
            border-color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="success-icon-box">
                <!-- Clean, animated inline SVG checkmark -->
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h2>Login Successful</h2>
            <p class="subtitle">Welcome back! You have successfully authenticated into your secure space.</p>
            
            <div class="user-badge">
                <div class="avatar">U</div>
                <div class="user-info">
                    <div class="name">Authenticated User</div>
                    <div class="role">Session Active</div>
                </div>
            </div>
            
            <a href="login.html" class="btn">Sign Out</a>
        </div>
    </div>

</body>
</html>
