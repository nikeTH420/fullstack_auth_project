<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        /* Card Container */
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .auth-card {
            background: rgba(25, 27, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Mobile Input Layout */
        .phone-input-container {
            display: flex;
            gap: 0.5rem;
        }

        .phone-prefix {
            width: 80px;
            padding: 0.8rem;
            background: #181a23;
            border: 1px solid #2d3142;
            border-radius: 8px;
            color: #9ca3af;
            font-size: 0.95rem;
            text-align: center;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #181a23;
            border: 1px solid #2d3142;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            background: #1c1e2b;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Password Constraints Checklist */
        .constraints-list {
            background: #14161e;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #1f222f;
        }

        .constraint-item {
            font-size: 0.8rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
            transition: color 0.2s ease;
        }

        .constraint-item:last-child {
            margin-bottom: 0;
        }

        /* Rule Met State */
        .constraint-item.valid {
            color: #10b981;
        }
        
        .constraint-item.valid::before {
            content: "✓";
            font-weight: bold;
        }

        .constraint-item::before {
            content: "•";
            width: 12px;
            display: inline-block;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            margin-left: 4px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create account</h2>
            <p class="subtitle">Get started with your free account today.</p>
            
            <form action="success.html" id="signup-form">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
                </div>

                <!-- NEW: Mobile Number with Constraints -->
                <div class="input-group">
                    <label for="signup-phone">Mobile Number</label>
                    <div class="phone-input-container">
                        <input type="text" class="phone-prefix" value="+1" readonly tabindex="-1">
                        <input type="tel" id="signup-phone" placeholder="555-0123" required 
                               pattern="[0-9]{10}" title="Please enter a valid 10-digit mobile number" autocomplete="tel">
                    </div>
                </div>

                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@example.com" required autocomplete="email">
                </div>
                
                <!-- UPDATED: Password with strict pattern validation attributes -->
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required autocomplete="new-password"
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};':&quot;\\|,.<>\/?]).{8,}"
                           title="Password must meet all complexity requirements listed below.">
                </div>

                <!-- NEW: Dynamic Password Constraints Checklist -->
                <div class="constraints-list">
                    <div class="constraint-item" id="length">At least 8 characters</div>
                    <div class="constraint-item" id="uppercase">At least one uppercase letter (A-Z)</div>
                    <div class="constraint-item" id="lowercase">At least one lowercase letter (a-z)</div>
                    <div class="constraint-item" id="number">At least one number (0-9)</div>
                    <div class="constraint-item" id="special">At least one special character (!@#$...)</div>
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('signup-password');
        
        const constraints = {
            length: (str) => str.length >= 8,
            uppercase: (str) => /[A-Z]/.test(str),
            lowercase: (str) => /[a-z]/.test(str),
            number: (str) => /[0-9]/.test(str),
            special: (str) => /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(str)
        };

        passwordInput.addEventListener('input', function() {
            const val = passwordInput.value;
            
            // Loop through constraints and toggle '.valid' class
            for (const key in constraints) {
                const element = document.getElementById(key);
                if (constraints[key](val)) {
                    element.classList.add('valid');
                } else {
                    element.classList.remove('valid');
                }
            }
        });
    </script>
</body>
</html>
